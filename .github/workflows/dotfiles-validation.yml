name: Dotfiles Validation

on:
  push:
    branches:
      - main
      - "release/**"
  pull_request:

concurrency:
  group: dotfiles-validation-${{ github.ref }}
  cancel-in-progress: true

jobs:
  codacy-safety-net:
    runs-on: ubuntu-latest
    env:
      CODACY_ACCOUNT_TOKEN: ${{ secrets.CODACY_ACCOUNT_TOKEN }}
    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd

      - name: Set up uv
        uses: astral-sh/setup-uv@08807647e7069bb48b6ef5acd8ec9567f424441b

      - name: Run unit tests with coverage
        run: uv run --with coverage==7.5.4 coverage run -m unittest discover -s tests

      - name: Generate coverage XML
        run: uv run --with coverage==7.5.4 coverage xml

      - name: Upload coverage to Codacy
        if: ${{ env.CODACY_ACCOUNT_TOKEN != '' }}
        continue-on-error: true
        run: |
          bash <(curl -Ls https://coverage.codacy.com/get.sh) report \
            --api-token "$CODACY_ACCOUNT_TOKEN" \
            -r coverage.xml
